<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<script src="https://cdn.jsdelivr.net/npm/aframe-gesture-detector@3.0.0/dist/aframe-gesture-detector.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-gesture-handler@3.0.0/dist/aframe-gesture-handler.min.js"></script>

</head>

<body style="margin:0; overflow:hidden;">

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;"
gesture-detector
>

<a-assets>
<a-asset-item id="modelo" src="ammonite.glb"></a-asset-item>
</a-assets>

<a-marker type="pattern" url="marker.patt">

<a-entity
gltf-model="#modelo"
scale="80.5 80.5 80.5"
position="0 0 0"
gesture-handler
></a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
