<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Modelo</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

<script>

AFRAME.registerComponent('gesture-handler', {

init: function () {

const el = this.el
const scene = document.querySelector('a-scene')

let currentScale = 1
let startScale = 1
let rotation = 0

scene.addEventListener("loaded", () => {

const hammer = new Hammer(scene.canvas)

hammer.get('pinch').set({ enable: true })
hammer.get('pan').set({ direction: Hammer.DIRECTION_HORIZONTAL })

// ROTACION SUAVE
hammer.on("pan", (ev) => {

rotation += ev.deltaX * 0.2

el.setAttribute("rotation", {
x:0,
y:rotation,
z:0
})

})

// ZOOM INICIO
hammer.on("pinchstart", () => {

startScale = currentScale

})

// ZOOM
hammer.on("pinch", (ev) => {

currentScale = startScale * ev.scale

// limitar zoom
currentScale = Math.max(0.3, Math.min(currentScale, 4))

el.setAttribute("scale", {
x: currentScale,
y: currentScale,
z: currentScale
})

})

})

}

})

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>
<a-asset-item id="modelo" src="ammonite_escala2.glb"></a-asset-item>
</a-assets>

<!-- ILUMINACION MEJORADA -->

<a-entity light="type: ambient; intensity: 1.2"></a-entity>

<a-entity light="type: hemisphere; intensity: 1; groundColor: #444"></a-entity>

<a-entity
light="type: directional;
intensity: 1.2"
position="2 4 2">
</a-entity>

<a-marker type="pattern" url="marker.patt">

<a-entity
gltf-model="#modelo"
scale="1 1 1"
position="0 0 0"
gesture-handler>
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
