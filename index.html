<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Mejorado</title>

<!-- A-Frame y AR.js -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<!-- Hammer.js para gestos -->
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

<script>
// Componente para gestos: rotar con inercia y zoom persistente
AFRAME.registerComponent('gesture-handler', {
  init: function () {
    const el = this.el
    const scene = document.querySelector('a-scene')

    let baseScale = el.getAttribute('scale').x
    let currentScale = baseScale

    let rotation = el.getAttribute('rotation')
    let velocityY = 0
    let lastTime = null

    const inertia = () => {
      if (Math.abs(velocityY) > 0.01) {
        rotation.y += velocityY
        el.setAttribute("rotation", rotation)
        velocityY *= 0.92 // fricción
        requestAnimationFrame(inertia)
      }
    }

    scene.addEventListener("loaded", () => {
      const hammer = new Hammer(scene.canvas)
      hammer.get('pinch').set({ enable: true })
      hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL })

      // ROTACION SUAVE CON INERCIA
      hammer.on("panstart", (ev) => {
        velocityY = 0
        lastTime = Date.now()
      })

      hammer.on("pan", (ev) => {
        const now = Date.now()
        const dt = now - lastTime
        rotation.y += ev.deltaX * 0.1
        velocityY = (ev.deltaX * 0.1) / (dt / 16) // velocidad relativa
        el.setAttribute("rotation", rotation)
        lastTime = now
      })

      hammer.on("panend", (ev) => {
        inertia() // aplica inercia al soltar
      })

      // ZOOM CON PELLIZCO
      hammer.on("pinchstart", (ev) => {
        baseScale = currentScale
      })

      hammer.on("pinch", (ev) => {
        currentScale = baseScale * ev.scale
        // limitar zoom
        if(currentScale < 0.2) currentScale = 0.2
        if(currentScale > 5) currentScale = 5
        el.setAttribute("scale", { x: currentScale, y: currentScale, z: currentScale })
      })
    })
  }
})
</script>

</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <!-- Activos -->
  <a-assets>
    <a-asset-item id="modelo" src="ammonite_escala2.glb"></a-asset-item>
  </a-assets>

  <!-- Iluminación para modelo brillante -->
  <a-entity light="type: ambient; intensity: 0.6"></a-entity>
  <a-entity light="type: directional; intensity: 0.8; position: 1 2 1"></a-entity>
  <a-entity light="type: directional; intensity: 0.5; position: -1 2 1"></a-entity>

  <!-- Marcador -->
  <a-marker type="pattern" url="marker.patt">

    <!-- Modelo 3D con gestos -->
    <a-entity
      gltf-model="#modelo"
      scale="1 1 1"
      position="0 0 0"
      rotation="0 0 0"
      gesture-handler
    ></a-entity>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
